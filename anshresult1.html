<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ansh Pratap VIP Result Portal</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* 🌌 3D BACKGROUND */
body {
    height: 100vh;
    background: radial-gradient(circle at center, #0f2027, #000000);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow: hidden;
}

/* 🔥 FLOATING TEXT ALL AROUND */
.bg-text span {
    position: absolute;
    color: rgba(0,255,255,0.08);
    font-size: 40px;
    animation: float 10s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh) rotate(0deg); }
    to { transform: translateY(-100vh) rotate(360deg); }
}

/* LOGO */
.logo {
    position: absolute;
    top: 20px;
    right: 25px;
    padding: 10px 18px;
    border-radius: 30px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px #00ffff;
    color: #00ffff;
    font-weight: bold;
}

/* 💎 3D CARD */
.container {
    width: 380px;
    padding: 35px;
    border-radius: 25px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(25px);
    box-shadow: 0 0 40px rgba(0,255,255,0.4);
    text-align: center;
    transform-style: preserve-3d;
    transition: 0.5s;
}

.container:hover {
    transform: rotateY(10deg) rotateX(10deg) scale(1.05);
}

/* INPUT */
select, input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.12);
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 13px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ff00cc, #00ffff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 0 20px #ff00cc;
}

/* CAPTCHA */
.captcha-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#captcha {
    background: black;
    padding: 10px 15px;
    border-radius: 10px;
    letter-spacing: 3px;
    color: #00ffcc;
}

/* 🎉 POPUP */
.popup {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup-content {
    padding: 40px;
    border-radius: 20px;
    background: rgba(0,0,0,0.8);
    box-shadow: 0 0 50px #00ffff;
    animation: pop 0.6s;
}

.popup h1 {
    color: #00ffcc;
}

@keyframes pop {
    from { transform: scale(0); }
    to { transform: scale(1); }
}
</style>
</head>

<body>

<!-- 🔥 FLOAT TEXT -->
<div class="bg-text">
    <span style="left:5%">ANSH PRATAP</span>
    <span style="left:20%; animation-delay:2s;">ANSH PRATAP</span>
    <span style="left:40%; animation-delay:4s;">ANSH PRATAP</span>
    <span style="left:60%; animation-delay:6s;">ANSH PRATAP</span>
    <span style="left:80%; animation-delay:8s;">ANSH PRATAP</span>
</div>

<div class="logo">⚡ ANSH PRATAP</div>

<div class="container">
    <h2>UP Board Result</h2>

    <select id="year">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
    </select>

    <select id="class">
        <option value="12">Class 12</option>
        <option value="10">Class 10</option>
    </select>

    <input type="text" id="roll" placeholder="Enter 10 digit Roll Number">

    <div class="captcha-box">
        <div id="captcha"></div>
        <span onclick="generateCaptcha()">🔄</span>
    </div>

    <input type="text" id="captchaInput" placeholder="Enter Captcha">

    <button onclick="openResult()">Check Result</button>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h1>🎉 RESULT OUT 🎉</h1>
    </div>
</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

let captchaValue = "";

function generateCaptcha(){
    captchaValue = Math.random().toString(36).substring(2,7).toUpperCase();
    document.getElementById("captcha").innerText = captchaValue;
}

function showPopupAndOpen(url){
    document.getElementById("popup").style.display="flex";
    document.getElementById("sound").play();

    setTimeout(()=>{
        window.open(url,"_blank");
        document.getElementById("popup").style.display="none";
    },2000);
}

function openResult(){

let roll=document.getElementById("roll").value;
let cap=document.getElementById("captchaInput").value.toUpperCase();

if(roll.length!=10){alert("Enter 10 digit");return;}
if(cap!=captchaValue){alert("Wrong captcha");generateCaptcha();return;}

let y=document.getElementById("year").value;
let c=document.getElementById("class").value;

let url="";

if(y=="2023"||y=="2024"){
url=(c=="12")?
"https://upresults.upmsp.edu.in/ResultSearchModel/Intermediate?startYear=2023&endYear=2024":
"https://upresults.upmsp.edu.in/ResultSearchModel/HighSchool?startYear=2023&endYear=2024&resultType=reg";
showPopupAndOpen(url);return;
}

if(y=="2025"){
url=(c=="12")?
"https://upresults.upmsp.edu.in/ResultSearchModel/Intermediate?startYear=2025&endYear=2025":
"https://upresults.upmsp.edu.in/ResultSearchModel/HighSchool?startYear=2025&endYear=2025";
showPopupAndOpen(url);return;
}

if(y=="2026"){
url=(c=="12")?
"https://upresults.upmsp.edu.in/ResultSearchModel/Intermediate?startYear=2026&endYear=2026":
"https://upresults.upmsp.edu.in/ResultSearchModel/HighSchool?startYear=2026&endYear=2026";

fetch(url,{method:'HEAD'}).then(r=>{
if(r.ok){showPopupAndOpen(url);}
else{alert("Result not out");}
}).catch(()=>{alert("Result not out");});
}

}

generateCaptcha();

</script>

</body>
</html>
